<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGL Dispatch — Enterprise Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        :root {
            --corp-deep: #004341; --corp-emerald: #1B8056; --corp-light-emerald: #1B9E61; --corp-lime: #86BF6B; --corp-cream: #E3EDC4;
            --bg: #ffffff; --secondary-bg: #f5f7f5; --text-main: #004341; --text-hint: rgba(0, 67, 65, 0.6); --input-bg: #ffffff; --card-shadow: 0 10px 25px -5px rgba(0, 67, 65, 0.1);
        }
        [data-theme="dark"] {
            --bg: #002a29; --secondary-bg: #003635; --text-main: #E3EDC4; --text-hint: rgba(227, 237, 196, 0.6); --input-bg: #004341; --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: var(--input-bg); border: 1px solid rgba(27, 128, 86, 0.1); box-shadow: var(--card-shadow); border-radius: 1.5rem; }
        .tg-input { background: var(--input-bg); color: var(--text-main); border: 1.5px solid rgba(27, 128, 86, 0.1); border-radius: 1rem; transition: all 0.2s ease; }
        .tg-input:focus { border-color: var(--corp-lime); box-shadow: 0 0 0 3px rgba(134, 191, 107, 0.15); outline: none; }
        .btn-primary { background: linear-gradient(135deg, var(--corp-emerald), var(--corp-deep)); color: #ffffff; font-weight: 700; border-radius: 1rem; }
        .tab-active { color: var(--corp-emerald); font-weight: 800; border-bottom: 3px solid var(--corp-emerald); }
        .choice-active { background: var(--corp-emerald) !important; color: white !important; border-color: var(--corp-lime); }
        .step-container { display: none; } .step-container.active { display: block; }
        .bottom-nav { background: var(--bg); border-top: 1px solid rgba(27, 128, 86, 0.1); backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
        .admin-tab { display: none; } .admin-tab.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased min-h-screen pb-24">
    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-[var(--bg)] flex items-center justify-center hidden">
        <div class="w-full max-w-xs p-8 text-center space-y-8">
            <img src="/logo/arrow_default.png" class="w-24 h-24 mx-auto object-contain">
            <div><h1 class="text-3xl font-extrabold tracking-tight">AGL Premium</h1><p class="text-xs text-[var(--text-hint)] mt-2">Введите ключ доступа</p></div>
            <input type="password" id="login-key-input" class="w-full p-4 tg-input text-center font-bold tracking-[0.5em]">
            <button onclick="attemptLogin()" id="login-btn" class="w-full py-5 btn-primary uppercase tracking-widest text-xs">Войти</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <!-- HEADER -->
        <header class="px-6 pt-6 pb-4 flex justify-between items-center sticky top-0 bg-[var(--bg)] z-50">
            <div class="flex items-center space-x-3">
                <img src="/logo/arrow_default.png" class="w-10 h-10 object-contain">
                <div><h2 class="text-xl font-extrabold leading-none">AGL</h2><p class="text-[8px] font-bold text-[var(--corp-lime)] tracking-widest uppercase">Platform</p></div>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="openTariffsModal()" class="px-3 py-1 bg-[var(--corp-cream)] text-[var(--corp-deep)] rounded-full text-[10px] font-bold uppercase tracking-tighter shadow-sm">📑 Тарифы</button>
                <div id="user-profile-badge" class="px-3 py-1 bg-[var(--secondary-bg)] rounded-full border border-[var(--corp-lime)]/20 text-[10px] font-bold uppercase tracking-tighter">
                    <span id="user-name-display">...</span>
                </div>
            </div>
        </header>

        <main id="view-form" class="view-tab px-6 pt-4">
            <div id="step-1" class="step-container active space-y-8 animate-fade">
                <h1 class="text-3xl font-extrabold">Направление</h1>
                <div id="region-buttons-grid" class="grid grid-cols-2 gap-4">
                    <!-- Dynamic: populated by buildRegionButtons() -->
                </div>
            </div>

            <div id="step-2" class="step-container space-y-8 animate-fade">
                <h1 class="text-3xl font-extrabold">Способ доставки</h1>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectMethod('Авто')" id="met-road" class="p-5 tg-input font-bold text-xs">АВТО</button>
                    <button onclick="selectMethod('Контейнер')" id="met-cont" class="p-5 tg-input font-bold text-xs">КОНТЕЙНЕР</button>
                    <button onclick="selectMethod('Ж/Д Вагон')" id="met-rail" class="p-5 tg-input font-bold text-xs">ВАГОН</button>
                    <button onclick="selectMethod('Авиа')" id="met-air" class="p-5 tg-input font-bold text-xs">АВИА</button>
                    <button onclick="selectMethod('Мультимодальная')" id="met-multi" class="p-5 tg-input font-bold text-xs">МУЛЬТИ</button>
                </div>
                <button onclick="goToStep1()" class="w-full py-4 text-[var(--corp-emerald)] font-bold text-xs uppercase opacity-60">← Назад</button>
            </div>

            <div id="step-3" class="step-container space-y-8 animate-fade pb-12">
                <div class="flex items-center justify-between">
                    <button onclick="goToStep2()" id="btn-back-step3" class="text-[var(--corp-emerald)] font-bold text-sm">← Способ</button>
                    <div class="px-4 py-1.5 bg-[var(--corp-cream)] text-[var(--corp-deep)] rounded-full text-[10px] font-extrabold uppercase tracking-tighter" id="summary-badge">---</div>
                </div>
                <form id="requestForm" class="space-y-8">
                    <div id="edit-only-fields" class="hidden space-y-4 p-6 bg-[var(--secondary-bg)] rounded-[2rem] border border-[var(--corp-lime)]/30">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase opacity-40">Статус заявки</label>
                            <select id="status-select" class="w-full p-4 tg-input text-sm font-bold" onchange="toggleStatusDetails()"></select>
                        </div>
                        <div id="winner-block" class="hidden space-y-2">
                            <label class="block text-[10px] font-bold uppercase opacity-40">Победитель</label>
                            <select id="winner-select" class="w-full p-4 tg-input text-sm bg-green-50/50"></select>
                        </div>
                        <div id="cancel-block" class="hidden space-y-2">
                            <label class="block text-[10px] font-bold uppercase opacity-40">Причина отмены</label>
                            <select id="cancel_reason" class="w-full p-4 tg-input text-sm bg-red-50/50"></select>
                        </div>
                        <button type="button" onclick="pingLogistics()" id="btn-ping-logistics" class="w-full py-4 mt-2 bg-blue-900 text-white rounded-2xl font-bold text-xs uppercase shadow border border-blue-400">🔔 Напомнить в канал</button>
                        
                        <!-- BIDS LIST INSIDE FORM -->
                        <div class="pt-4 border-t border-[var(--corp-lime)]/10">
                            <label class="block text-[10px] font-bold uppercase opacity-40 mb-3">Ставки от логистов</label>
                            <div id="request-bids-list" class="space-y-3"></div>
                        </div>

                        <!-- COMMENTS/HISTORY -->
                        <div class="pt-6 border-t border-[var(--corp-lime)]/10">
                            <label class="block text-[10px] font-bold uppercase opacity-40 mb-3">История обсуждения</label>
                            <div id="request-comments-list" class="space-y-3"></div>
                        </div>

                        <button type="button" onclick="mainButtonClicked()" class="w-full py-5 bg-[var(--corp-emerald)] text-white text-xs font-bold uppercase rounded-2xl shadow-xl mt-6">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                    </div>
                    <section class="space-y-4">
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="route_from" placeholder="Откуда *" class="w-full p-4 tg-input text-sm"><input type="text" id="route_to" placeholder="Куда *" class="w-full p-4 tg-input text-sm"></div>
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="loading_address" placeholder="Адрес погрузки" class="w-full p-4 tg-input text-xs"><input type="text" id="customs_address" placeholder="Затаможка" class="w-full p-4 tg-input text-xs"></div>
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="clearance_address" placeholder="Растаможка" class="w-full p-4 tg-input text-xs"><input type="text" id="unloading_address" placeholder="Адрес выгрузки" class="w-full p-4 tg-input text-xs"></div>
                    </section>
                    <div id="dynamic-fields" class="space-y-6 bg-[var(--secondary-bg)] p-6 rounded-[2rem] border border-[var(--corp-lime)]/10"></div>
                    <section class="space-y-5">
                        <input type="text" id="cargo_name" placeholder="Груз *" class="w-full p-4 tg-input text-sm">
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="cargo_value" placeholder="Стоимость *" class="w-full p-4 tg-input text-sm"><input type="text" id="hs_code" placeholder="ТН ВЭД *" class="w-full p-4 tg-input text-sm"></div>
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="cargo_weight" placeholder="Вес (т) *" class="w-full p-4 tg-input text-sm"><input type="text" id="cargo_places" placeholder="Объем/Места *" class="w-full p-4 tg-input text-sm"></div>
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="packaging" placeholder="Упаковка" class="w-full p-4 tg-input text-sm"><select id="dangerous_cargo" class="w-full p-4 tg-input text-sm"><option value="Нет">Обычный</option><option value="Да">ОПАСНЫЙ (ADR)</option></select></div>
                        <select id="urgency_type" class="w-full p-4 tg-input text-sm"><option value="Стандарт">Срочность: Стандарт</option><option value="Срочно">🔥 СРОЧНО</option></select>
                    </section>
                    <section class="space-y-5">
                        <input type="text" id="client_company" placeholder="Компания клиента" class="w-full p-4 tg-input text-sm">
                        <div class="grid grid-cols-2 gap-4"><input type="text" id="responsible" class="w-full p-4 tg-input text-xs bg-[var(--secondary-bg)] opacity-60" readonly><input type="text" id="target" placeholder="Таргет $" class="w-full p-4 tg-input text-xs"></div>
                        
                        <!-- ATTACHMENTS SECTION -->
                        <div class="space-y-3">
                            <label class="block text-[10px] font-bold uppercase opacity-40">Вложения (фото, документы)</label>
                            <div id="attachments-list" class="flex flex-wrap gap-2"></div>
                            <button type="button" onclick="document.getElementById('file-upload-input').click()" class="w-full py-3 bg-[var(--secondary-bg)] border-2 border-dashed border-[var(--corp-lime)]/30 rounded-2xl text-[10px] font-bold uppercase opacity-60 hover:opacity-100 transition-all">+ Добавить файл</button>
                            <input type="file" id="file-upload-input" class="hidden" multiple onchange="handleFileUpload(event)">
                        </div>

                        <textarea id="message_text" placeholder="Комментарии..." class="w-full p-4 tg-input text-sm" rows="3"></textarea>
                    </section>
                </form>
            </div>
        </main>

        <main id="view-list" class="view-tab hidden px-6 pt-4 animate-fade space-y-4">
            <h1 class="text-3xl font-extrabold tracking-tight">Заявки</h1>
            <div class="flex space-x-2">
                <input type="text" id="search-input" placeholder="Поиск..." class="flex-1 p-4 tg-input text-sm" oninput="debounceListSearch()">
                <button onclick="toggleMyRequests()" id="my-req-toggle" class="px-4 py-2 bg-[var(--secondary-bg)] opacity-40 rounded-xl text-[10px] font-bold uppercase">МОИ</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <select id="filter-status" class="p-3 tg-input text-[10px] font-bold" onchange="loadRequests()">
                    <option value="">Все статусы</option>
                    <option value="Открыта">Открыта</option>
                    <option value="В работе">В работе</option>
                    <option value="Успешно реализована">Успешно</option>
                    <option value="Отменена">Отменена</option>
                </select>
                <select id="filter-region" class="p-3 tg-input text-[10px] font-bold" onchange="loadRequests()">
                    <option value="">Все регионы</option>
                    <option value="Европа">Европа</option>
                    <option value="Китай">Китай</option>
                    <option value="СНГ">СНГ</option>
                    <option value="Индия/ЮВА">Индия/ЮВА</option>
                    <option value="Турция">Турция</option>
                </select>
            </div>
            <div id="requests-container" class="space-y-4 pb-12"></div>
        </main>

        <main id="view-bids" class="view-tab hidden px-6 pt-4 animate-fade space-y-4">
             <h1 class="text-3xl font-extrabold tracking-tight">Ставки</h1>
             <div class="flex p-1 bg-[var(--secondary-bg)] rounded-2xl">
                <button onclick="switchBidView('tenders')" id="bv-tenders" class="flex-1 py-3 text-[10px] font-extrabold rounded-xl">ТЕНДЕРЫ</button>
                <button onclick="switchBidView('my')" id="bv-my" class="flex-1 py-3 text-[10px] font-extrabold rounded-xl opacity-40">МОИ СТАВКИ</button>
            </div>
            <div id="tender-filters" class="grid grid-cols-2 gap-2">
                <select id="tf-region" class="p-3 tg-input text-[10px] font-bold" onchange="switchBidView('tenders')">
                    <option value="">Все регионы</option>
                    <option value="Европа">Европа</option>
                    <option value="Китай">Китай</option>
                    <option value="СНГ">СНГ</option>
                </select>
                <select id="tf-transport" class="p-3 tg-input text-[10px] font-bold" onchange="switchBidView('tenders')">
                    <option value="">Весь транспорт</option>
                    <option value="Авто">Авто</option>
                    <option value="Ж/Д">Ж/Д</option>
                    <option value="Авиа">Авиа</option>
                    <option value="Мультимодальная">Мультимодал</option>
                </select>
            </div>
            <div id="bids-container" class="space-y-5 pb-12"></div>
        </main>

        <main id="view-users" class="view-tab hidden animate-fade">
            <div class="px-6 pt-4 pb-6 space-y-2 border-b border-[var(--corp-lime)]/10">
                <h1 class="text-3xl font-extrabold tracking-tight">Управление</h1>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar py-2">
                    <button onclick="switchAdminTab('users')" id="at-users" class="admin-tab-btn flex-shrink-0 px-4 py-2 bg-[var(--corp-cream)] text-[var(--corp-deep)] rounded-xl text-[10px] font-bold uppercase">Сотрудники</button>
                    <button onclick="switchAdminTab('dict')" id="at-dict" class="admin-tab-btn flex-shrink-0 px-4 py-2 bg-[var(--secondary-bg)] opacity-40 rounded-xl text-[10px] font-bold uppercase">Списки</button>
                    <button onclick="switchAdminTab('stats')" id="at-stats" class="admin-tab-btn flex-shrink-0 px-4 py-2 bg-[var(--secondary-bg)] opacity-40 rounded-xl text-[10px] font-bold uppercase">Аналитика</button>
                    <button onclick="switchAdminTab('settings')" id="at-settings" class="admin-tab-btn flex-shrink-0 px-4 py-2 bg-[var(--secondary-bg)] opacity-40 rounded-xl text-[10px] font-bold uppercase">Настройки</button>
                    <button onclick="switchAdminTab('tariffs')" id="at-tariffs" class="admin-tab-btn flex-shrink-0 px-4 py-2 bg-[var(--secondary-bg)] opacity-40 rounded-xl text-[10px] font-bold uppercase">Тарифы</button>
                </div>
            </div>
            <!-- USERS -->
            <div id="admin-users" class="admin-tab active p-6 space-y-6">
                <div class="flex space-x-2">
                    <input type="text" id="user-search" placeholder="Поиск по имени..." class="flex-1 p-4 tg-input text-xs" oninput="renderUsersList()">
                </div>
                <div class="flex p-1 bg-[var(--secondary-bg)] rounded-2xl">
                    <button onclick="filterUsers('all')" id="uf-all" class="flex-1 py-3 text-[9px] font-extrabold rounded-xl bg-[var(--corp-cream)] text-[var(--corp-deep)]">ВСЕ</button>
                    <button onclick="filterUsers('admin')" id="uf-admin" class="flex-1 py-3 text-[9px] font-extrabold rounded-xl opacity-40">АДМИНЫ</button>
                    <button onclick="filterUsers('manager')" id="uf-manager" class="flex-1 py-3 text-[9px] font-extrabold rounded-xl opacity-40">МЕНЕДЖЕРЫ</button>
                </div>
                
                <div id="user-editor-form" class="glass-card p-5 space-y-4 hidden animate-fade">
                    <div class="text-[10px] font-extrabold uppercase opacity-40">Редактор сотрудника</div>
                    <input type="hidden" id="edit-user-id">
                    <input type="text" id="edit-user-name" placeholder="Имя Фамилия" class="w-full p-4 tg-input text-xs">
                    <select id="edit-user-role" class="w-full p-4 tg-input text-xs font-bold">
                        <option value="manager">Менеджер (Manager)</option>
                        <option value="admin">Админ (Admin)</option>
                    </select>
                    <div id="edit-user-rotate-row" class="hidden space-y-2">
                        <div class="flex space-x-2">
                            <input type="text" id="edit-user-manual-key" placeholder="Пароль (пусто для авто)" class="flex-1 p-3 tg-input text-xs">
                            <button type="button" onclick="rotateUserKey()" class="px-4 py-3 bg-[var(--corp-cream)] text-[var(--corp-deep)] text-[10px] font-bold rounded-xl uppercase">ОБНОВИТЬ КЛЮЧ</button>
                        </div>
                    </div>
                    <div class="flex space-x-2 pt-2">
                        <button onclick="saveUser()" class="flex-1 py-4 btn-primary text-[10px] uppercase shadow-md">Сохранить</button>
                        <button onclick="hideUserEditor()" class="px-6 py-4 bg-gray-100 text-gray-500 text-[10px] uppercase font-bold rounded-2xl">Отмена</button>
                    </div>
                </div>

                <button id="add-user-btn" onclick="showUserEditor()" class="w-full py-4 btn-primary text-[10px] uppercase shadow-md">+ Добавить сотрудника</button>
                <div id="users-list-full" class="space-y-4 pb-12"></div>
            </div>
            <!-- DICT (Interactive List Editor) -->
            <div id="admin-dict" class="admin-tab p-6 space-y-6">
                <div id="dict-selector-view" class="space-y-3">
                    <button onclick="openDictEditor('incoterms')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">Инкотермс <span>➔</span></button>
                    <button onclick="openDictEditor('ports')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">Порты <span>➔</span></button>
                    <button onclick="openDictEditor('border_crossings')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">Погранпереходы <span>➔</span></button>
                    <button onclick="openDictEditor('transport_subtypes')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">Подтипы транспорта <span>➔</span></button>
                    <button onclick="openDictEditor('transport_types')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">🚛 Типы перевозки <span>➔</span></button>
                    <button onclick="openDictEditor('regions')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">🌍 Регионы <span>➔</span></button>
                    <button onclick="openDictEditor('currencies')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">💰 Валюты <span>➔</span></button>
                    <button onclick="openDictEditor('cancel_reasons')" class="w-full p-5 glass-card flex justify-between items-center font-bold text-xs uppercase">❌ Причины отмены <span>➔</span></button>
                </div>
                <div id="dict-editor-view" class="hidden space-y-4">
                    <button onclick="closeDictEditor()" class="text-[10px] font-bold uppercase text-[var(--corp-emerald)]">← Назад</button>
                    <div class="flex space-x-2"><input type="text" id="new-dict-item" placeholder="Новый..." class="flex-1 p-3 tg-input text-xs"><button onclick="addDictItem()" class="px-4 py-3 btn-primary text-[10px] font-bold">ДОБАВИТЬ</button></div>
                    <div id="dict-items-list" class="space-y-2 max-h-[50vh] overflow-y-auto no-scrollbar"></div>
                    <button onclick="saveDictChanges()" class="w-full py-4 btn-primary text-xs uppercase">Сохранить</button>
                </div>
            </div>
            <!-- STATS (Excel Export) -->
            <div id="admin-stats" class="admin-tab p-6 space-y-6">
                <div class="flex p-1 bg-[var(--secondary-bg)] rounded-2xl mb-2">
                    <button onclick="changeStatsRange(7)" id="sf-7" class="flex-1 py-2 text-[8px] font-extrabold rounded-xl opacity-40">НЕДЕЛЯ</button>
                    <button onclick="changeStatsRange(30)" id="sf-30" class="flex-1 py-2 text-[8px] font-extrabold rounded-xl bg-[var(--corp-cream)] text-[var(--corp-deep)]">МЕСЯЦ</button>
                    <button onclick="changeStatsRange(0)" id="sf-0" class="flex-1 py-2 text-[8px] font-extrabold rounded-xl opacity-40">ВСЁ ВРЕМЯ</button>
                </div>
                <button onclick="exportXLSX()" class="w-full py-4 bg-[var(--corp-emerald)] text-white rounded-xl text-[10px] font-extrabold uppercase">Выгрузить EXCEL 📊</button>
                <div class="glass-card p-6 text-center"><div class="text-[10px] font-bold opacity-40 uppercase">Среднее время закрытия</div><div class="text-4xl font-extrabold text-[var(--corp-emerald)]" id="stat-avg-time">0 ч</div></div>
                <canvas id="managerChart"></canvas>
                <canvas id="regionChart"></canvas>
            </div>
            <!-- SETTINGS -->
            <div id="admin-settings" class="admin-tab p-6 space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase opacity-40">AI Дополнительный промпт</label>
                    <textarea id="set-ai-prompt" class="w-full p-4 tg-input text-xs" rows="4" placeholder="Дополнительные инструкции для AI ассистента..."></textarea>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase opacity-40">AI Строгость</label>
                    <select id="set-ai-strictness" class="w-full p-4 tg-input text-xs font-bold">
                        <option value="low">Мягкая — AI принимает неполные данные</option>
                        <option value="medium">Средняя — AI уточняет пропуски</option>
                        <option value="high">Строгая — AI требует ВСЕ поля</option>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold uppercase opacity-40">Channel ID</label>
                        <input type="text" id="set-channel-id" placeholder="Channel ID" class="w-full p-4 tg-input text-xs">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold uppercase opacity-40">Discussion ID</label>
                        <input type="text" id="set-discussion-id" placeholder="Discussion Group ID" class="w-full p-4 tg-input text-xs">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase opacity-40">Интервал напоминаний (мин)</label>
                    <input type="number" id="set-reminder-interval" placeholder="120" class="w-full p-4 tg-input text-xs">

                <button onclick="saveSettings()" class="w-full py-4 btn-primary text-xs uppercase">Сохранить настройки</button>
            </div>
            <!-- TARIFFS MGMT -->
            <div id="admin-tariffs" class="admin-tab p-6 space-y-6">
                <div class="glass-card p-6 space-y-4">
                    <div class="text-[10px] font-extrabold uppercase opacity-40">Загрузить новый тариф</div>
                    <input type="text" id="tariff-upload-title" placeholder="Название (напр. Авиа Май 2026)" class="w-full p-4 tg-input text-xs">
                    <button onclick="document.getElementById('tariff-file-input').click()" class="w-full py-4 bg-[var(--secondary-bg)] border-2 border-dashed border-[var(--corp-lime)]/30 rounded-2xl text-[10px] font-bold uppercase">+ Выбрать файл (XLSX, DOCX)</button>
                    <input type="file" id="tariff-file-input" class="hidden" onchange="handleTariffUpload(event)">
                    <div id="tariff-upload-status" class="text-[9px] text-center font-bold text-[var(--corp-emerald)]"></div>
                </div>
                <div class="space-y-3">
                    <div class="text-[10px] font-extrabold uppercase opacity-40">Актуальные тарифы</div>
                    <div id="admin-tariffs-list" class="space-y-2"></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 px-6 py-4 flex justify-between items-center z-50">
            <button onclick="switchTab('form')" id="tab-form" class="flex flex-col items-center space-y-1 tab-active transition-all"><span class="text-xl">📝</span><span class="text-[8px] font-extrabold uppercase">Форма</span></button>
            <button onclick="switchTab('list')" id="tab-list" class="flex flex-col items-center space-y-1 opacity-40 transition-all"><span class="text-xl">🗂️</span><span class="text-[8px] font-extrabold uppercase">База</span></button>
            <button onclick="switchTab('bids')" id="tab-bids" class="flex flex-col items-center space-y-1 opacity-40 transition-all"><span class="text-xl">🤝</span><span class="text-[8px] font-extrabold uppercase">Ставки</span></button>
            <button onclick="switchTab('users')" id="tab-users" class="hidden flex flex-col items-center space-y-1 opacity-40 transition-all"><span class="text-xl">⚙️</span><span class="text-[8px] font-extrabold uppercase">Упр.</span></button>
        </nav>
    </div>

    <!-- BID MODAL -->
    <div id="bid-modal" class="fixed inset-0 z-[110] bg-black/60 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="w-[90%] glass-card p-8 space-y-6 animate-fade">
            <div class="flex justify-between items-center"><h2 class="text-xl font-extrabold uppercase">Сделать ставку</h2><button onclick="closeBidModal()" class="text-2xl">×</button></div>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4"><input type="text" id="bid-amount" placeholder="Сумма *" class="w-full p-4 tg-input text-sm font-bold"><select id="bid-currency" class="w-full p-4 tg-input text-sm"><option value="USD">USD</option><option value="EUR">EUR</option><option value="CNY">CNY</option><option value="RUB">RUB</option></select></div>
                <div class="grid grid-cols-2 gap-4"><input type="text" id="bid-validity" placeholder="Валидность" class="w-full p-4 tg-input text-sm"><select id="bid-loading-hours" class="w-full p-4 tg-input text-sm"><option value="12ч">12ч погр/выгр</option><option value="24ч" selected>24ч погр/выгр</option><option value="48ч">48ч погр/выгр</option></select></div>
                <select id="bid-payment" class="w-full p-4 tg-input text-sm"><option value="Безнал с НДС">Безнал с НДС</option><option value="Безнал без НДС">Безнал без НДС</option><option value="Наличные">Наличные / Перевод</option></select>
                <textarea id="bid-demurrage" placeholder="Условия простоя..." class="w-full p-4 tg-input text-xs" rows="2"></textarea>
                <textarea id="bid-comment" placeholder="Комментарий..." class="w-full p-4 tg-input text-xs" rows="2"></textarea>
            </div>
            <button onclick="confirmBid()" class="w-full py-5 btn-primary text-xs uppercase shadow-2xl">Подтвердить ставку</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let currentStep = 1, currentTab = 'form', currentAdminTab = 'users', selectedDirection = '', selectedMethod = '', editModeId = null, activeBidReqId = null, myRequestsOnly = false;
        let managerChartInstance = null, regionChartInstance = null, currentDictName = '', currentDictItems = [];

        // --- XSS-safe helpers ---
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        // Build DOM element with attributes and children. Children can be strings (used as textContent) or Nodes.
        function el(tag, attrs, ...children) {
            const node = document.createElement(tag);
            if (attrs) {
                for (const k in attrs) {
                    const v = attrs[k];
                    if (v === null || v === undefined || v === false) continue;
                    if (k === 'class' || k === 'className') node.className = v;
                    else if (k === 'text') node.textContent = v;
                    else if (k === 'html') node.innerHTML = v; // ONLY for trusted constants
                    else if (k === 'on' && typeof v === 'object') {
                        for (const ev in v) node.addEventListener(ev, v[ev]);
                    } else if (k.startsWith('on') && typeof v === 'function') {
                        node.addEventListener(k.slice(2), v);
                    } else if (k === 'dataset' && typeof v === 'object') {
                        for (const dk in v) node.dataset[dk] = v[dk];
                    } else {
                        node.setAttribute(k, v);
                    }
                }
            }
            for (const child of children) {
                if (child === null || child === undefined || child === false) continue;
                if (Array.isArray(child)) {
                    child.forEach(c => { if (c !== null && c !== undefined && c !== false) node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
                } else if (typeof child === 'string' || typeof child === 'number') {
                    node.appendChild(document.createTextNode(String(child)));
                } else {
                    node.appendChild(child);
                }
            }
            return node;
        }
        function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
        function fmtId(id) { return '#' + String(id || 0).padStart(4, '0'); }
        function format_datetime(v) {
            if (!v) return '';
            try {
                const d = new Date(v);
                if (isNaN(d)) return String(v).substring(0,16);
                return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            } catch(e) { return ''; }
        }
        let cachedRegions = null;
        let cachedCurrencies = null;
        let cachedCancelReasons = null;

        function checkProfile() {
            fetch(`/api/profile?initData=${encodeURIComponent(tg.initData)}`).then(r => r.json()).then(data => {
                if (data.profile) {
                    document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('user-name-display').textContent = data.profile.name; document.getElementById('responsible').value = data.profile.name;
                    if (['admin', 'superuser'].includes(data.profile.role)) document.getElementById('tab-users').classList.remove('hidden');
                    // Load settings (regions, currencies, cancel_reasons)
                    fetch(`/api/settings?initData=${encodeURIComponent(tg.initData)}`).then(r=>r.json()).then(res=>{
                        const s = res.settings || {};
                        cachedRegions = s.regions || [{name:'СНГ',emoji:'🗺️'},{name:'Европа',emoji:'🇪🇺'},{name:'Китай',emoji:'🇨🇳'},{name:'Другое',emoji:'🌐'}];
                        cachedCurrencies = s.currencies || ['USD','EUR','RUB','CNY','UZS','KZT'];
                        cachedCancelReasons = s.cancel_reasons || ['Ставка не прошла','Груз отменился','Выбрали другого экспедитора','Не устроили сроки'];
                        buildRegionButtons();
                        buildRegionFilters();
                        buildCurrencyOptions();
                    });
                    loadRequests();
                } else document.getElementById('login-screen').classList.remove('hidden');
            });
        }
        function buildRegionButtons(){
            const c = document.getElementById('region-buttons-grid');
            if(!c || !cachedRegions) return;
            clear(c);
            cachedRegions.forEach(r => {
                const name = typeof r === 'object' ? r.name : r;
                const emoji = typeof r === 'object' ? (r.emoji||'🌍') : '🌍';
                const btn = el('div',{class:'glass-card p-6 flex flex-col items-center space-y-3 cursor-pointer', onclick:()=>selectDirection(name)},
                    el('span',{class:'text-3xl',text:emoji}),
                    el('span',{class:'font-bold text-xs uppercase tracking-widest',text:name})
                );
                c.appendChild(btn);
            });
        }
        function buildRegionFilters(){
            if(!cachedRegions) return;
            ['filter-region','tf-region'].forEach(id=>{
                const sel = document.getElementById(id); if(!sel) return;
                const val = sel.value;
                while(sel.options.length>1) sel.remove(1);
                cachedRegions.forEach(r=>{
                    const name = typeof r === 'object' ? r.name : r;
                    sel.appendChild(el('option',{value:name,text:name}));
                });
                sel.value = val;
            });
        }
        function buildCurrencyOptions(){
            if(!cachedCurrencies) return;
            const sel = document.getElementById('bid-currency'); if(!sel) return;
            clear(sel);
            cachedCurrencies.forEach(c=>sel.appendChild(el('option',{value:c,text:c})));
        }

        function attemptLogin() {
            const key = document.getElementById('login-key-input').value;
            fetch('/api/login_with_key', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ initData: tg.initData, login_key: key }) })
            .then(r => r.json()).then(res => { if(res.ok) { tg.showAlert(`Добро пожаловать, ${res.name}!`); checkProfile(); } else tg.showAlert("Неверный ключ"); });
        }

        function switchTab(t) {
            currentTab = t; document.querySelectorAll('nav button').forEach(b => { b.classList.add('opacity-40'); b.classList.remove('tab-active'); });
            document.getElementById('tab-' + t).classList.remove('opacity-40'); document.getElementById('tab-' + t).classList.add('tab-active');
            document.querySelectorAll('.view-tab').forEach(v => v.classList.add('hidden')); document.getElementById('view-' + t).classList.remove('hidden');
            if(t === 'users') switchAdminTab(currentAdminTab); if(t === 'bids') switchBidView('tenders'); updateMainButton();
        }

        function switchBidView(view) {
            document.getElementById('bv-tenders').classList.toggle('opacity-40', view !== 'tenders');
            document.getElementById('bv-my').classList.toggle('opacity-40', view !== 'my');
            document.getElementById('tender-filters').classList.toggle('hidden', view !== 'tenders');
            const cont = document.getElementById('bids-container'); cont.innerHTML = '<div class="p-10 text-center opacity-40 text-xs">Загрузка...</div>';
            
            let endpoint = view === 'tenders' ? '/api/requests?status=Открыта' : '/api/my_bids';
            if (view === 'tenders') {
                const reg = document.getElementById('tf-region').value;
                const tr = document.getElementById('tf-transport').value;
                if (reg) endpoint += `&region=${encodeURIComponent(reg)}`;
                if (tr) endpoint += `&transport=${encodeURIComponent(tr)}`;
            }
            const sep = endpoint.includes('?') ? '&' : '?';
            fetch(`${endpoint}${sep}initData=${encodeURIComponent(tg.initData)}`)
            .then(r => r.json())
            .then(data => {
                clear(cont);
                const items = data.requests || data.bids || [];
                if (items.length === 0) {
                    cont.appendChild(el('div', { class: 'p-10 text-center opacity-40 text-xs', text: 'Пока ничего нет' }));
                    return;
                }
                items.forEach(r => {
                    const idText = fmtId(r.id || r.request_id);
                    // Use request_route_from/to for bids, or route_from/to for requests
                    const from = r.route_from || r.request_route_from || '...';
                    const to = r.route_to || r.request_route_to || '...';
                    const route = from + ' → ' + to;
                    
                    const header = el('div', { class: 'flex justify-between items-start' },
                        el('div', null,
                            el('div', { class: 'text-[9px] font-extrabold text-[var(--corp-emerald)]', text: idText }),
                            el('div', { class: 'font-bold text-sm', text: route })
                        ),
                        el('div', { class: 'text-[8px] font-bold opacity-40 uppercase', text: r.transport_cat || '' })
                    );
                    let actionEl;
                    if (view === 'tenders') {
                        actionEl = el('button', {
                            class: 'w-full py-4 btn-primary text-[10px] font-bold',
                            onclick: () => openBidModal(r.id),
                            text: 'СДЕЛАТЬ СТАВКУ'
                        });
                    } else {
                        actionEl = el('div', { class: 'flex justify-between items-center w-full space-x-2' },
                            el('div', { class: 'flex-1 p-3 bg-[var(--secondary-bg)] rounded-xl text-xs font-bold text-[var(--corp-emerald)]', text: 'Ваша ставка: ' + (r.amount || '0') + ' ' + (r.currency || '') }),
                            el('button', { class: 'px-4 py-3 bg-[var(--corp-cream)] text-[var(--corp-deep)] text-[10px] font-bold rounded-xl uppercase', onclick: () => openBidModal(r.request_id), text: 'ИЗМЕНИТЬ' })
                        );
                    }
                    cont.appendChild(el('div', { class: 'glass-card p-6 space-y-4 animate-fade' }, header, actionEl));
                });
            })
            .catch(err => {
                console.error("switchBidView error:", err);
                clear(cont);
                cont.appendChild(el('div', { class: 'p-10 text-center text-red-500 text-xs', text: 'Ошибка загрузки данных' }));
            });
        }

        function openBidModal(reqId) {
            activeBidReqId = reqId;
            ['bid-amount','bid-validity','bid-demurrage','bid-comment'].forEach(id=>document.getElementById(id).value='');
            document.getElementById('bid-currency').value = 'USD';
            document.getElementById('bid-loading-hours').value = '24ч';
            document.getElementById('bid-payment').value = 'Безнал с НДС';
            
            fetch(`/api/user_bid?initData=${encodeURIComponent(tg.initData)}&id=${reqId}`)
            .then(r => r.json()).then(res => {
                if(res.bid) {
                    const b = res.bid;
                    document.getElementById('bid-amount').value = b.amount || '';
                    document.getElementById('bid-currency').value = b.currency || 'USD';
                    document.getElementById('bid-validity').value = b.validity || '';
                    document.getElementById('bid-loading-hours').value = b.loading_hours || '24ч';
                    document.getElementById('bid-payment').value = b.payment_terms || b.payment_method || 'Безнал с НДС';
                    document.getElementById('bid-demurrage').value = b.demurrage || '';
                    document.getElementById('bid-comment').value = b.comment || '';
                }
                document.getElementById('bid-modal').classList.remove('hidden');
            });
        }
        function closeBidModal() {
            activeBidReqId = null;
            document.getElementById('bid-modal').classList.add('hidden');
        }
        function confirmBid() {
            const amount = document.getElementById('bid-amount').value;
            if(!amount) { tg.showAlert("⚠️ Введите сумму ставки"); return; }
            const payload = {
                initData: tg.initData,
                request_id: activeBidReqId,
                amount: amount,
                currency: document.getElementById('bid-currency').value,
                validity: document.getElementById('bid-validity').value,
                loading_hours: document.getElementById('bid-loading-hours').value,
                payment_method: document.getElementById('bid-payment').value,
                demurrage: document.getElementById('bid-demurrage').value,
                comment: document.getElementById('bid-comment').value
            };
            tg.MainButton.showProgress();
            fetch('/api/bid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                tg.MainButton.hideProgress();
                if(res.ok) {
                    tg.showAlert("✅ Ставка принята");
                    closeBidModal();
                    switchBidView('tenders');
                } else {
                    tg.showAlert("❌ Ошибка: " + res.error);
                }
            });
        }

        function switchAdminTab(t) {
            currentAdminTab = t; document.querySelectorAll('.admin-tab-btn').forEach(b => { b.classList.add('opacity-40'); b.classList.remove('bg-[var(--corp-cream)]'); });
            document.getElementById('at-' + t).classList.remove('opacity-40'); document.getElementById('at-' + t).classList.add('bg-[var(--corp-cream)]');
            document.querySelectorAll('.admin-tab').forEach(tab => tab.classList.remove('active')); document.getElementById('admin-' + t).classList.add('active');
            if(t === 'users') loadUsersList(); if(t === 'settings') loadSettings(); if(t === 'stats') loadStats();
            if(t === 'tariffs') loadTariffsList('admin');
        }

        function openDictEditor(name) {
            currentDictName = name; document.getElementById('dict-selector-view').classList.add('hidden'); document.getElementById('dict-editor-view').classList.remove('hidden');
            fetch(`/api/dictionary?initData=${encodeURIComponent(tg.initData)}&name=${name}`).then(r => r.json()).then(data => { currentDictItems = data.items || []; renderDictItems(); });
        }
        function closeDictEditor() { document.getElementById('dict-selector-view').classList.remove('hidden'); document.getElementById('dict-editor-view').classList.add('hidden'); }
        function renderDictItems() {
            const list = document.getElementById('dict-items-list');
            clear(list);
            currentDictItems.forEach((item, idx) => {
                const controls = el('div', { class: 'flex space-x-2' },
                    el('button', { class: 'opacity-40', onclick: () => moveDict(idx, -1), text: '↑' }),
                    el('button', { class: 'opacity-40', onclick: () => moveDict(idx, 1), text: '↓' }),
                    el('button', { class: 'text-red-500 font-bold ml-2', onclick: () => delDict(idx), text: '×' })
                );
                list.appendChild(el('div',
                    { class: 'flex justify-between items-center p-4 bg-[var(--secondary-bg)] rounded-xl border border-[var(--corp-lime)]/10' },
                    el('span', { class: 'text-xs font-bold', text: typeof item === 'object' ? (item.emoji||'') + ' ' + item.name : String(item) }),
                    controls
                ));
            });
        }
        function moveDict(idx, dir) { let n = idx + dir; if(n<0||n>=currentDictItems.length) return; [currentDictItems[idx],currentDictItems[n]]=[currentDictItems[n],currentDictItems[idx]]; renderDictItems(); }
        function delDict(idx) { currentDictItems.splice(idx,1); renderDictItems(); }
        function addDictItem() {
            const inp = document.getElementById('new-dict-item'); const v = inp.value.trim(); if(!v) return;
            // Deduplication check
            const exists = currentDictItems.some(item => {
                const itemName = typeof item === 'object' ? item.name : String(item);
                return itemName.toLowerCase() === v.toLowerCase();
            });
            if(exists){ tg.showAlert('⚠️ Элемент уже существует: ' + v); return; }
            if(currentDictName === 'regions') { currentDictItems.push({name: v, emoji: '🌍'}); }
            else { currentDictItems.push(v); }
            inp.value=''; renderDictItems();
        }
        function saveDictChanges() {
            fetch('/api/settings/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ initData: tg.initData, key: currentDictName, value: currentDictItems }) })
            .then(() => {
                tg.showAlert("Сохранено ✅");
                if(currentDictName === 'regions') { cachedRegions = currentDictItems; buildRegionButtons(); buildRegionFilters(); }
                if(currentDictName === 'currencies') { cachedCurrencies = currentDictItems; buildCurrencyOptions(); }
                if(currentDictName === 'cancel_reasons') { cachedCancelReasons = currentDictItems; }
                loadDictionaries();
            });
        }

        function selectDirection(dir) {
            selectedDirection = dir;
            document.querySelectorAll('#region-buttons-grid .glass-card').forEach(c => {
                c.classList.remove('choice-active');
                const label = c.querySelector('span:last-child');
                if(label && label.textContent === dir) c.classList.add('choice-active');
            });
            currentStep = 2;
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
        }
        function selectMethod(met) { selectedMethod = met; document.querySelectorAll('#step-2 button').forEach(b => b.classList.remove('choice-active')); const idMap = { 'Авто': 'met-road', 'Контейнер': 'met-cont', 'Ж/Д Вагон': 'met-rail', 'Авиа': 'met-air', 'Мультимодальная': 'met-multi' }; if(idMap[met]) document.getElementById(idMap[met]).classList.add('choice-active'); currentStep = 3; document.getElementById('step-2').classList.remove('active'); document.getElementById('step-3').classList.add('active'); document.getElementById('summary-badge').textContent = `${selectedDirection} | ${selectedMethod}`; setupFields(); updateMainButton(); }
        function goToStep1() { currentStep = 1; document.getElementById('step-2').classList.remove('active'); document.getElementById('step-1').classList.add('active'); }
        function goToStep2() { 
            if (editModeId) { resetForm(); switchTab('list'); return; }
            currentStep = 2; document.getElementById('step-3').classList.remove('active'); document.getElementById('step-2').classList.add('active'); tg.MainButton.hide(); 
        }

        function setupFields(cb) {
            const container = document.getElementById('dynamic-fields'); 
            container.innerHTML = '';
            let html = '';

            // 1. Region & Transport Specific Logic
            if(selectedDirection === 'Европа') {
                html += `<div class="space-y-4 pt-4 border-t border-[var(--corp-lime)]/10"><label class="block text-[10px] font-bold uppercase opacity-40">Европа: Специфика</label>`;
                html += `<select id="delivery_terms_eu" class="w-full p-4 tg-input text-sm font-bold"><option value="">Инкотермс...</option></select>`;
                if (selectedMethod === 'Авто') {
                    html += `<select id="route_type" class="w-full p-4 tg-input text-sm"><option value="через РФ + КЗ">Маршрут: через РФ + КЗ</option><option value="через Турцию">Маршрут: через Турцию (Т3)</option></select>`;
                    html += `<select id="transit_rf_allowed" class="w-full p-4 tg-input text-sm"><option value="Разрешен">Транзит по РФ: Разрешен</option><option value="Запрещен">Транзит по РФ: Запрещен</option></select>`;

        function renderUsersList() {
            const list = document.getElementById('users-list-full');
            const searchInput = document.getElementById('user-search');
            const search = searchInput ? searchInput.value.toLowerCase() : '';
            clear(list);

            const filtered = allUsers.filter(u => {
                const matchSearch = (u.name || '').toLowerCase().includes(search);
                const matchRole = userFilter === 'all' || u.role === userFilter;
                return matchSearch && matchRole;
            });

            if (filtered.length === 0) {
                list.appendChild(el('div', { class: 'p-10 text-center opacity-40 text-xs', text: 'Никого не найдено' }));
                return;
            }

            filtered.forEach(u => {
                const roleLine = (u.role || '') + (u.telegram_id ? ' 🔗' : '');
                const keyDisplay = u.login_key ? u.login_key : '••••';
                const head = el('div', { class: 'flex justify-between items-start' },
                    el('div', null,
                        el('div', { class: 'font-bold text-sm', text: u.name || 'Сотрудник' }),

                                 } else {
                                     tg.showAlert("Ключ не назначен");
                                 }
                             },
                             text: keyDisplay })
                );
                const actions = el('div', { class: 'flex space-x-2 border-t pt-3' },
                    el('button', {
                        class: 'flex-1 py-2 bg-[var(--corp-cream)] text-[var(--corp-deep)] text-[9px] font-extrabold rounded-lg uppercase',

            document.getElementById('edit-user-role').value = 'manager';
            // New users: ключ генерируется и показывается после Сохранить.
            document.getElementById('edit-user-rotate-row').classList.add('hidden');
        }

        function hideUserEditor() {
            document.getElementById('add-user-btn').classList.remove('hidden');
            document.getElementById('user-editor-form').classList.add('hidden');
        }

        function editUser(u) {
            document.getElementById('add-user-btn').classList.add('hidden');
            document.getElementById('user-editor-form').classList.remove('hidden');
            document.getElementById('edit-user-id').value = u.id;
            document.getElementById('edit-user-name').value = u.name || '';
            document.getElementById('edit-user-role').value = u.role || 'manager';
            document.getElementById('edit-user-rotate-row').classList.remove('hidden');
        }

        function saveUser() {
            const userId = document.getElementById('edit-user-id').value;
            const name = document.getElementById('edit-user-name').value.trim();
            const role = document.getElementById('edit-user-role').value;
            if (!name) { tg.showAlert("⚠️ Введите имя"); return; }
            if (role !== 'manager' && role !== 'admin') { tg.showAlert("⚠️ Роль должна быть manager или admin"); return; }

            if (userId) {
                // UPDATE existing
                fetch('/api/user_update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, user_id: Number(userId), name, role })
                }).then(r => r.json()).then(res => {
                    if (res.ok) { tg.showAlert("✅ Сохранено"); hideUserEditor(); loadUsersList(); }
                    else tg.showAlert("❌ Ошибка: " + (res.error || 'unknown'));
                });
            } else {
                // CREATE new — server generates the key and returns it once.
                fetch('/api/user_create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, name, role })
                }).then(r => r.json()).then(res => {
                    if (res.ok && res.login_key) {
                        tg.showAlert("✅ Сотрудник создан\n\nКлюч (показывается один раз):\n" + res.login_key + "\n\nПередайте его сотруднику — повторно ключ узнать нельзя.");
                        hideUserEditor();
                        loadUsersList();
                    } else {
                        tg.showAlert("❌ Ошибка: " + (res.error || 'unknown'));
                    }
                });
            }
        }

        function loadDictionaries(callback) {
            fetch(`/api/settings?initData=${encodeURIComponent(tg.initData)}`)
            .then(r => r.json())
            .then(res => {
                const s = res.settings;
                if (s) {
                    const fillSelect = (id, items) => {
                        const sel = document.getElementById(id);
                        if (!sel || !items) return;
                        const itemsArr = Array.isArray(items) ? items : [];
                        if (itemsArr.length === 0) return;
                        clear(sel);
                        itemsArr.forEach(t => {
                            const opt = document.createElement('option');
                            opt.value = String(t);
                            opt.textContent = String(t);
                            sel.appendChild(opt);
                        });
                    };

                    fillSelect('delivery_terms_eu', s.incoterms);
                    // Only fill border_crossing_cn from settings if the select has 0 or 1 options (#22)
                    const bcc = document.getElementById('border_crossing_cn');
                    if (bcc && bcc.options.length <= 1 && s.border_crossings && s.border_crossings.length > 0) {
                        fillSelect('border_crossing_cn', s.border_crossings);
                    }
                    fillSelect('container_type_cn', s.transport_subtypes);

                    // Only fill ports_list if it doesn't have options yet (avoids overwriting regional specific ports)
                    const pl = document.getElementById('ports_list');
                    if (pl && pl.options.length <= 1 && s.ports && s.ports.length > 0) {
                        fillSelect('ports_list', s.ports);
                    }
                }
                if (callback) callback();
            }).catch(err => {
                console.error("loadDictionaries error:", err);
                if (callback) callback();
            });
        }
        function exportXLSX() { tg.MainButton.showProgress(); fetch('/api/export_xlsx', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ initData: tg.initData }) }).then(r => r.json()).then(res => { tg.MainButton.hideProgress(); if(res.ok) tg.showAlert("📊 Файл отправлен вам в ЛС!"); }); }
        let currentStatsRange = 30;
        function changeStatsRange(days) {
            currentStatsRange = days;
            document.querySelectorAll('#admin-stats button[id^="sf-"]').forEach(b => {
                b.classList.add('opacity-40');
                b.classList.remove('bg-[var(--corp-cream)]', 'text-[var(--corp-deep)]');
            });
            const active = document.getElementById('sf-' + days);
            active.classList.remove('opacity-40');
            active.classList.add('bg-[var(--corp-cream)]', 'text-[var(--corp-deep)]');
            loadStats();
        }
        function loadStats() {
            fetch(`/api/stats?initData=${encodeURIComponent(tg.initData)}&days=${currentStatsRange}`).then(r => r.json()).then(res => { 
                const s = res.stats; 
                document.getElementById('stat-avg-time').textContent = s.avg_closing_hours + " ч"; 
                if(managerChartInstance) managerChartInstance.destroy(); 
                managerChartInstance = new Chart(document.getElementById('managerChart'), { type: 'bar', data: { labels: s.managers.map(m => m.name), datasets: [{ label: 'Заявок', data: s.managers.map(m => m.count), backgroundColor: '#1B8056', borderRadius: 8 }] }, options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } } }); 
                if(regionChartInstance) regionChartInstance.destroy(); 
                regionChartInstance = new Chart(document.getElementById('regionChart'), { type: 'doughnut', data: { labels: s.regions.map(r => r.name), datasets: [{ data: s.regions.map(r => r.count), backgroundColor: ['#004341', '#1B8056', '#1B9E61', '#86BF6B', '#E3EDC4'] }] } }); 
            });
        }
        function saveSettings() {
            const batch = [
                { key: 'ai_prompt_extra', value: document.getElementById('set-ai-prompt').value },
                { key: 'ai_strictness', value: document.getElementById('set-ai-strictness').value },
                { key: 'channel_id', value: document.getElementById('set-channel-id').value },
                { key: 'discussion_id', value: document.getElementById('set-discussion-id').value },
                { key: 'reminder_interval', value: parseInt(document.getElementById('set-reminder-interval').value) || 120 }
            ];
            Promise.all(batch.map(item => fetch('/api/settings/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ initData: tg.initData, key: item.key, value: item.value }) })))
            .then(() => tg.showAlert('✅ Настройки сохранены'));
        }
        function doRotateKey(userId, newKey) {
            fetch('/api/user_rotate_key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: tg.initData, user_id: Number(userId), new_key: newKey })
            }).then(r => r.json()).then(res => {
                if (res.ok) {
                    tg.showAlert("🔑 Ключ обновлен: " + res.new_key);
                    document.getElementById('edit-user-manual-key').value = '';
                    loadUsersList();
                } else {
                    tg.showAlert("❌ Ошибка: " + (res.error || 'unknown'));
                }
            });
        }
        function rotateUserKey() {
            const userId = document.getElementById('edit-user-id').value;
            const newKey = document.getElementById('edit-user-manual-key').value.trim();
            if (!userId) return;
            if (!newKey) {
                tg.showConfirm("Сгенерировать новый случайный ключ доступа?", (confirmed) => {
                    if(confirmed) doRotateKey(userId, '');
                });
                return;
            }
            doRotateKey(userId, newKey);
        }
        function deleteUser(userId, name) {
            tg.showConfirm("Удалить сотрудника" + (name ? " «" + name + "»" : "") + "?", (confirmed) => {
                if(!confirmed) return;
                fetch('/api/user_update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, user_id: Number(userId), action: 'delete' })
                }).then(r => r.json()).then(res => {
                    if (res.ok) loadUsersList();
                    else tg.showAlert("❌ Ошибка: " + (res.error || 'unknown'));
                });
            });
        }
        function loadSettings() {
            fetch(`/api/settings?initData=${encodeURIComponent(tg.initData)}`).then(r => r.json()).then(res => {
                const s = res.settings;
                document.getElementById('set-ai-prompt').value = s.ai_prompt_extra || '';
                document.getElementById('set-ai-strictness').value = s.ai_strictness || 'medium';
                document.getElementById('set-channel-id').value = s.channel_id || '';
                document.getElementById('set-discussion-id').value = s.discussion_id || '';
                document.getElementById('set-reminder-interval').value = s.reminder_interval || 120;
            });
        }

        let uploadedAttachmentIds = [];
        function handleFileUpload(event) {
            const files = event.target.files; if (!files.length) return;
            for (let file of files) {
                const formData = new FormData(); formData.append('file', file);
                const loadingItem = el('div', { class: 'px-3 py-2 bg-[var(--corp-lime)]/10 rounded-lg text-[10px] animate-pulse', text: 'Загрузка...' });
                document.getElementById('attachments-list').appendChild(loadingItem);
                fetch(`/api/upload?initData=${encodeURIComponent(tg.initData)}`, { method: 'POST', body: formData })
                .then(r => r.json()).then(res => {
                    loadingItem.remove();
                    if (res.ok) { uploadedAttachmentIds.push(res.attachment_id); addAttachmentToUI(res); }
                    else tg.showAlert('Ошибка: ' + res.error);
                });
            }
        }
        function addAttachmentToUI(att) {
            const list = document.getElementById('attachments-list');
            const type = att.file_type || att.type || '';
            const name = att.file_name || att.name || 'file';
            const url = att.file_path || att.url || '';
            const isImg = type.startsWith('image/');
            const item = el('div', { class: 'relative' },
                isImg ? el('img', { src: url, class: 'w-16 h-16 object-cover rounded-xl border border-white/20 shadow-sm', onclick:()=>window.open(url) })
                      : el('div', { class: 'w-16 h-16 flex items-center justify-center bg-[var(--secondary-bg)] rounded-xl border border-white/20 text-[8px] font-bold text-center p-1 break-all shadow-sm', onclick:()=>window.open(url), text: name }),
                el('button', { type: 'button', class: 'absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center shadow-md', onclick: (e) => { e.stopPropagation(); removeAttachment(att.attachment_id || att.id, item); }, text: '×' })
            );
            list.appendChild(item);
        }
        function removeAttachment(id, element) { uploadedAttachmentIds = uploadedAttachmentIds.filter(aid => aid !== id); element.remove(); }

        function openTariffsModal() {
            document.getElementById('tariffs-modal').classList.remove('hidden');
            loadTariffsList('user');
        }
        function closeTariffsModal() {
            document.getElementById('tariffs-modal').classList.add('hidden');
        }
        function loadTariffsList(context = 'user') {
            const cont = document.getElementById(context === 'user' ? 'tariffs-list-container' : 'admin-tariffs-list');
            if(!cont) return;
            cont.innerHTML = '<div class="text-center opacity-40 text-[10px] py-10">Загрузка...</div>';
            
            fetch(`/api/tariffs?initData=${encodeURIComponent(tg.initData)}`)
            .then(r => r.json())
            .then(data => {
                clear(cont);
                const list = data.tariffs || [];
                if(list.length === 0) {
                    cont.appendChild(el('div', { class: 'text-center opacity-40 text-[10px] py-10', text: 'Файлов пока нет' }));
                    return;
                }
                list.forEach(t => {
                    const isXls = t.file_name.toLowerCase().endsWith('.xlsx') || t.file_name.toLowerCase().endsWith('.xls');
                    const icon = isXls ? '📊' : '📄';
                    const colorClass = isXls ? 'text-green-600' : 'text-blue-600';
                    
                    const item = el('div', { class: 'p-4 bg-[var(--secondary-bg)] rounded-2xl flex justify-between items-center animate-fade border border-[var(--corp-lime)]/5' },
                        el('div', { class: 'flex items-center space-x-3' },
                            el('span', { class: 'text-xl ' + colorClass, text: icon }),
                            el('div', null,
                                el('div', { class: 'text-[11px] font-bold leading-tight', text: t.title }),
                                el('div', { class: 'text-[8px] opacity-40 mt-1', text: format_datetime(t.created_at) + ' • ' + (t.uploader_name || 'System') })
                            )
                        ),
                        context === 'user' 
                            ? el('button', { onclick: () => window.open(t.file_path), class: 'px-4 py-2 bg-[var(--corp-cream)] text-[var(--corp-deep)] text-[9px] font-extrabold rounded-xl uppercase shadow-sm', text: 'Открыть' })
                            : el('button', { onclick: () => deleteTariff(t.id), class: 'text-red-500 font-bold px-3 py-2 bg-red-50 rounded-xl', text: 'Удалить' })
                    );
                    cont.appendChild(item);
                });
            });
        }
        function handleTariffUpload(event) {
            const file = event.target.files[0]; if(!file) return;
            const title = document.getElementById('tariff-upload-title').value.trim();
            if(!title) { tg.showAlert("⚠️ Введите название для файла"); return; }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('file', file);
            
            const status = document.getElementById('tariff-upload-status');
            status.textContent = "⌛ Загрузка на сервер...";
            
            fetch(`/api/tariffs/upload?initData=${encodeURIComponent(tg.initData)}`, {
                method: 'POST',
                body: formData
            }).then(r => r.json()).then(res => {
                status.textContent = "";
                if(res.ok) {
                    tg.showAlert("✅ Тариф успешно загружен");
                    document.getElementById('tariff-upload-title').value = '';
                    document.getElementById('tariff-file-input').value = '';
                    loadTariffsList('admin');
                } else {
                    tg.showAlert("❌ Ошибка: " + (res.error || "upload failed"));
                }
            });
        }
        function deleteTariff(id) {
            tg.showConfirm("Удалить этот тариф из общего доступа?", (confirmed) => {
                if(!confirmed) return;
                fetch('/api/tariffs/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ initData: tg.initData, id: id })
                }).then(r => r.json()).then(res => {
                    if(res.ok) loadTariffsList('admin');
                });
            });
        }

        checkProfile();
    </script>
</body>
</html>
